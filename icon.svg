    <rect x="-6" y="-94" width="12" height="188" rx="6" fill="#6b1a1a"/>
    <!-- page lines -->
    <line x1="-120" y1="-70" x2="-30" y2="-92" stroke="#e8d8d8" stroke-width="5" stroke-linecap="round"/>
    <line x1="-120" y1="-30" x2="-30" y2="-50" stroke="#e8d8d8" stroke-width="5" stroke-linecap="round"/>
    <line x1="-120" y1="10" x2="-30" y2="-8" stroke="#e8d8d8" stroke-width="5" stroke-linecap="round"/>
    <line x1="30" y1="-92" x2="120" y2="-70" stroke="#e8d8d8" stroke-width="5" stroke-linecap="round"/>
    <line x1="30" y1="-50" x2="120" y2="-30" stroke="#e8d8d8" stroke-width="5" stroke-linecap="round"/>
    <line x1="30" y1="-8" x2="120" y2="10" stroke="#e8d8d8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- bookmark ribbon -->
